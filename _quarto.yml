project:
  type: website
  output-dir: docs
  preview:
    watch-inputs: false
    serve:
      cmd: "python3 -u -m http.server {port}"
      ready: "Serving HTTP"
  resources:
    - downloads/
    - .nojekyll
    - CNAME
  pre-render:
    - /opt/anaconda3/bin/python3 -m analysis.run_saved_data_pipeline

website:
  title: "Whale Hunters"
  navbar:
    left:
      - href: index.html
        text: Overview
      - href: results.html
        text: Backtest Results
      - href: methodology.html
        text: Methodology
      - href: asset-selection.html
        text: Asset Selection
      - href: trade-log.html
        text: Trade Log
      - href: monitoring.html
        text: Monitoring
      - href: about.html
        text: About
  page-footer:
    left: "FINTECH 533 • Whale Hunters"

format:
  html:
    theme:
      - cosmo
    css: styles.css
    toc: true
    code-fold: false

execute:
  echo: false
  warning: false
  message: false
  freeze: true
